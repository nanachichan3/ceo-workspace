<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>The 2 Sigma Problem</title>
  <desc>Bell curve showing learning outcome distribution comparing classroom, AI-assisted, and 1-on-1 tutoring</desc>

  <!-- Background -->
  <rect width="800" height="500" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0d1b2a">Bloom's 2 Sigma Problem</text>

  <!-- Bell curve path (normal distribution approximation) -->
  <!-- Using a bezier approximation of a bell curve -->
  <path d="M100,400
           Q120,399 150,395
           Q200,380 250,340
           Q300,270 350,200
           Q400,150 450,200
           Q500,270 550,340
           Q600,380 650,395
           Q680,399 700,400
           L700,400 L100,400 Z"
        fill="#0d1b2a" opacity="0.15"/>

  <!-- Bell curve outline -->
  <path d="M100,400
           Q120,399 150,395
           Q200,380 250,340
           Q300,270 350,200
           Q400,150 450,200
           Q500,270 550,340
           Q600,380 650,395
           Q680,399 700,400"
        fill="none" stroke="#0d1b2a" stroke-width="3"/>

  <!-- X-axis -->
  <line x1="60" y1="400" x2="740" y2="400" stroke="#0d1b2a" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="100" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d1b2a">-2σ</text>
  <text x="250" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d1b2a">-1σ</text>
  <text x="400" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d1b2a">Mean</text>
  <text x="550" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d1b2a">+1σ</text>
  <text x="700" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d1b2a">+2σ</text>

  <!-- X-axis title -->
  <text x="400" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#0d1b2a">Learning Performance</text>

  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="400" stroke="#0d1b2a" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="45" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#0d1b2a" transform="rotate(-90, 45, 240)">Number of Students</text>

  <!-- Markers on the curve -->
  <!-- Classroom Learners (x=400, main bell) -->
  <circle cx="400" cy="185" r="8" fill="#0d1b2a"/>
  <line x1="400" y1="193" x2="400" y2="400" stroke="#0d1b2a" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d1b2a">Classroom Learners</text>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a" opacity="0.7">50th percentile</text>

  <!-- AI-Assisted (+1.5σ) -->
  <circle cx="505" cy="250" r="8" fill="#c9a84c"/>
  <line x1="505" y1="258" x2="505" y2="400" stroke="#c9a84c" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="505" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#c9a84c">AI-Assisted</text>
  <text x="505" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c9a84c" opacity="0.7">~87th percentile</text>

  <!-- 1-on-1 Tutoring (+2σ) - far right tail -->
  <circle cx="610" cy="345" r="8" fill="#0d1b2a"/>
  <line x1="610" y1="353" x2="610" y2="400" stroke="#0d1b2a" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="610" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d1b2a">1-on-1 Tutoring</text>
  <text x="610" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a" opacity="0.7">98th percentile</text>

  <!-- Standard deviation markers on x-axis -->
  <g stroke="#0d1b2a" stroke-width="1">
    <line x1="250" y1="395" x2="250" y2="405"/>
    <line x1="550" y1="395" x2="550" y2="405"/>
  </g>

  <!-- Note -->
  <text x="400" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0d1b2a" opacity="0.6">Bloom's 2 Sigma Problem (1984) + AI meta-analysis (2025)</text>
</svg>
