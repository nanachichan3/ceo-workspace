<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>Credential Comparison Matrix</title>
  <desc>Matrix comparing different credential types across cost, time, signal quality, and flexibility</desc>

  <!-- Background -->
  <rect width="800" height="500" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0d1b2a">Credential Comparison Matrix</text>

  <!-- Table settings -->
  <!-- Columns: Label, Cost, Time, Signal Quality, Flexibility -->
  <!-- x positions: 100, 250, 380, 510, 640 -->
  <!-- Row heights: 80, 90, 90, 90, 90 (total starting at 100) -->
  <!-- Row y positions: 85, 155, 245, 335, 425 -->

  <!-- Table header -->
  <rect x="95" y="75" width="590" height="40" fill="#0d1b2a" rx="4"/>
  <text x="175" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f5f0e8">Credential</text>
  <text x="315" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f5f0e8">Cost</text>
  <text x="445" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f5f0e8">Time</text>
  <text x="575" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f5f0e8">Signal Quality</text>
  <text x="685" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f5f0e8">Flexibility</text>

  <!-- Row 1: Degree - navy -->
  <rect x="95" y="115" width="590" height="70" fill="none" stroke="#0d1b2a" stroke-width="2" rx="4"/>
  <text x="175" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0d1b2a">Traditional Degree</text>
  <!-- Cost: 4/4 circles (high cost) -->
  <circle cx="275" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="295" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="315" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="335" cy="150" r="8" fill="#0d1b2a"/>
  <!-- Time: 4/4 circles (long) -->
  <circle cx="405" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="425" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="445" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="465" cy="150" r="8" fill="#0d1b2a"/>
  <!-- Signal: 4/4 (high) -->
  <circle cx="535" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="555" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="575" cy="150" r="8" fill="#0d1b2a"/>
  <circle cx="595" cy="150" r="8" fill="#0d1b2a"/>
  <!-- Flexibility: 1/4 (low) -->
  <circle cx="665" cy="150" r="8" fill="#0d1b2a" opacity="0.25"/>
  <circle cx="685" cy="150" r="8" fill="#0d1b2a" opacity="0.25"/>
  <circle cx="705" cy="150" r="8" fill="#0d1b2a" opacity="0.25"/>
  <circle cx="725" cy="150" r="8" fill="#0d1b2a" opacity="0.25"/>

  <!-- Row 2: Certification - gray -->
  <rect x="95" y="185" width="590" height="70" fill="none" stroke="#7a7a7a" stroke-width="2" rx="4"/>
  <text x="175" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7a7a7a">Certification</text>
  <!-- Cost: 2/4 circles -->
  <circle cx="275" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="295" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="315" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="335" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Time: 2/4 circles -->
  <circle cx="405" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="425" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="445" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="465" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Signal: 2/4 (medium) -->
  <circle cx="535" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="555" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="575" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="595" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Flexibility: 2/4 -->
  <circle cx="665" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="685" cy="220" r="8" fill="#7a7a7a"/>
  <circle cx="705" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="725" cy="220" r="8" fill="#7a7a7a" opacity="0.25"/>

  <!-- Row 3: Portfolio - gray -->
  <rect x="95" y="255" width="590" height="70" fill="none" stroke="#7a7a7a" stroke-width="2" rx="4"/>
  <text x="175" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7a7a7a">Portfolio</text>
  <!-- Cost: 1/4 circles (low) -->
  <circle cx="275" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="295" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="315" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="335" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Time: 2/4 circles -->
  <circle cx="405" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="425" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="445" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <circle cx="465" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Signal: 3/4 (good) -->
  <circle cx="535" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="555" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="575" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="595" cy="290" r="8" fill="#7a7a7a" opacity="0.25"/>
  <!-- Flexibility: 4/4 (high) -->
  <circle cx="665" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="685" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="705" cy="290" r="8" fill="#7a7a7a"/>
  <circle cx="725" cy="290" r="8" fill="#7a7a7a"/>

  <!-- Row 4: Self-Degree - GOLD highlight -->
  <rect x="95" y="325" width="590" height="70" fill="#c9a84c" opacity="0.15" stroke="#c9a84c" stroke-width="2" rx="4"/>
  <text x="175" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#c9a84c">Self-Degree</text>
  <!-- Cost: 1/4 circles (very low) -->
  <circle cx="275" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="295" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="315" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="335" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <!-- Time: 1/4 circles (very fast) -->
  <circle cx="405" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="425" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="445" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="465" cy="360" r="8" fill="#c9a84c" opacity="0.25"/>
  <!-- Signal: 4/4 (high) -->
  <circle cx="535" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="555" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="575" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="595" cy="360" r="8" fill="#c9a84c"/>
  <!-- Flexibility: 4/4 (max) -->
  <circle cx="665" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="685" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="705" cy="360" r="8" fill="#c9a84c"/>
  <circle cx="725" cy="360" r="8" fill="#c9a84c"/>

  <!-- Legend -->
  <g transform="translate(95, 420)">
    <text x="0" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a">Rating: </text>
    <circle cx="60" cy="12" r="6" fill="#0d1b2a"/>
    <text x="75" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a">High</text>
    <circle cx="120" cy="12" r="6" fill="#0d1b2a" opacity="0.25"/>
    <text x="135" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a">Low</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(480, 420)">
    <rect x="0" y="0" width="200" height="30" fill="#c9a84c" rx="4"/>
    <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0d1b2a">Self-Degree: Best Value Profile</text>
  </g>
</svg>
