<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>Learning Formats: A Comparison</title>
  <desc>Four learning format icons compared: Traditional Classroom, Online Course, AI Tutoring, and Self-Degree</desc>

  <!-- Background -->
  <rect width="800" height="500" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0d1b2a">Learning Formats: A Comparison</text>

  <!-- Divider lines -->
  <line x1="200" y1="70" x2="200" y2="400" stroke="#0d1b2a" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="70" x2="400" y2="400" stroke="#0d1b2a" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="70" x2="600" y2="400" stroke="#0d1b2a" stroke-width="1" opacity="0.2"/>

  <!-- === Format 1: Traditional Classroom === -->
  <g transform="translate(100, 160)">
    <!-- Icon: Rows of desks -->
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#0d1b2a" stroke-width="2" rx="8" opacity="0.1"/>
    <!-- Desks row 1 -->
    <rect x="-40" y="-35" width="80" height="20" fill="#0d1b2a" rx="2"/>
    <rect x="-35" y="-30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-18" y="-30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-1" y="-30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="16" y="-30" width="12" height="10" fill="#f5f0e8"/>
    <!-- Desks row 2 -->
    <rect x="-40" y="-5" width="80" height="20" fill="#0d1b2a" rx="2"/>
    <rect x="-35" y="0" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-18" y="0" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-1" y="0" width="12" height="10" fill="#f5f0e8"/>
    <rect x="16" y="0" width="12" height="10" fill="#f5f0e8"/>
    <!-- Desks row 3 -->
    <rect x="-40" y="25" width="80" height="20" fill="#0d1b2a" rx="2"/>
    <rect x="-35" y="30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-18" y="30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="-1" y="30" width="12" height="10" fill="#f5f0e8"/>
    <rect x="16" y="30" width="12" height="10" fill="#f5f0e8"/>
    <!-- Label -->
    <text x="0" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0d1b2a">Traditional</text>
    <text x="0" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0d1b2a">Classroom</text>
    <!-- Stat -->
    <text x="0" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a" opacity="0.7">2 Sigma problem</text>
  </g>

  <!-- === Format 2: Online Course === -->
  <g transform="translate(300, 160)">
    <!-- Icon: Laptop -->
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#0d1b2a" stroke-width="2" rx="8" opacity="0.1"/>
    <rect x="-45" y="-30" width="90" height="55" fill="#0d1b2a" rx="4"/>
    <rect x="-38" y="-25" width="76" height="42" fill="#f5f0e8" rx="2"/>
    <!-- Screen content lines -->
    <line x1="-30" y1="-15" x2="10" y2="-15" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="-5" x2="25" y2="-5" stroke="#0d1b2a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-30" y1="3" x2="20" y2="3" stroke="#0d1b2a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Laptop base -->
    <path d="M-50,28 L50,28 L40,38 L-40,38 Z" fill="#0d1b2a"/>
    <!-- Label -->
    <text x="0" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0d1b2a">Online Course</text>
    <!-- Stat -->
    <text x="0" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0d1b2a" opacity="0.7">Growing 12%/yr</text>
  </g>

  <!-- === Format 3: AI Tutoring - GOLD HIGHLIGHT === -->
  <g transform="translate(500, 160)">
    <rect x="-60" y="-60" width="120" height="120" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="8"/>
    <!-- Icon: Brain + Chat -->
    <!-- Brain outline -->
    <ellipse cx="-15" cy="-10" rx="28" ry="25" fill="#c9a84c" opacity="0.3" stroke="#c9a84c" stroke-width="2"/>
    <!-- Brain wrinkles -->
    <path d="M-30,-5 Q-15,-18 0,-5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M-35,5 Q-15,-8 5,5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M-30,15 Q-15,2 0,15" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <!-- Chat bubble -->
    <rect x="10" y="-35" width="35" height="28" fill="#c9a84c" rx="4"/>
    <polygon points="15,5 22,-8 25,5" fill="#c9a84c"/>
    <line x1="17" y1="-23" x2="35" y2="-23" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="-14" x2="30" y2="-14" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round"/>
    <!-- Label -->
    <text x="0" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#c9a84c">AI Tutoring</text>
    <!-- Stat -->
    <text x="0" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c9a84c">0.87σ improvement</text>
  </g>

  <!-- === Format 4: Self-Degree - GOLD HIGHLIGHT === -->
  <g transform="translate(700, 160)">
    <rect x="-60" y="-60" width="120" height="120" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="8"/>
    <!-- Icon: Compass + Projects -->
    <!-- Compass -->
    <circle cx="-10" cy="0" r="28" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <polygon points="-10,-25 0,-10 10,-25" fill="#c9a84c"/>
    <polygon points="-10,25 0,10 10,25" fill="#c9a84c" opacity="0.5"/>
    <circle cx="-10" cy="0" r="4" fill="#c9a84c"/>
    <!-- Small project boxes -->
    <rect x="25" y="-20" width="25" height="18" fill="#c9a84c" rx="2"/>
    <rect x="30" y="-15" width="15" height="2" fill="#f5f0e8" opacity="0.7"/>
    <rect x="30" y="-10" width="10" height="2" fill="#f5f0e8" opacity="0.7"/>

    <rect x="25" y="2" width="25" height="18" fill="#c9a84c" opacity="0.6" rx="2"/>
    <rect x="30" y="7" width="15" height="2" fill="#f5f0e8" opacity="0.7"/>
    <rect x="30" y="12" width="10" height="2" fill="#f5f0e8" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#c9a84c">Self-Degree</text>
    <!-- Stat -->
    <text x="0" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c9a84c">Full Framework</text>
  </g>

  <!-- Key insight -->
  <rect x="300" y="450" width="200" height="30" fill="#c9a84c" rx="4"/>
  <text x="400" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#0d1b2a">AI-enhanced learning leads</text>
</svg>
